name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

      - name: Validate plugin.json (parses + required keys)
        run: |
          python3 <<'PY'
          import json, sys
          m = json.load(open('.claude-plugin/plugin.json'))
          required = {'name', 'description', 'version', 'author', 'license'}
          missing = required - set(m.keys())
          if missing:
              sys.exit(f'plugin.json missing required keys: {missing}')
          print(f'plugin.json: valid ({m["name"]} v{m["version"]})')
          PY

      - name: Verify skill count
        run: |
          count=$(ls -d skills/*/ | wc -l)
          echo "Skill count: $count"
          if [ "$count" -lt 23 ]; then
            echo "::error::Expected at least 23 skills, found $count"
            exit 1
          fi

      - name: Validate skill count consistency
        run: ./scripts/sync-skill-count.sh --check

      - name: Verify zero active TodoWrite references
        run: bash scripts/check-todowrite.sh

      - name: Check agent-filed bead discipline present
        run: bash scripts/check-agent-bead-stamp.sh

      - name: Skill contract tests
        run: bash tests/skills/test-getting-up-to-speed-contract.sh

      - name: TodoWrite gate self-test
        run: bash tests/skills/test-todowrite-gate.sh

      - name: Verify beads integration density
        run: |
          count=$(grep -r "bd create\|bd close\|bd ready" skills/ | wc -l)
          echo "Beads integration references: $count"
          if [ "$count" -lt 30 ]; then
            echo "::error::Expected at least 30 beads references, found $count"
            exit 1
          fi

      - name: Verify version sync
        run: bash scripts/bump-version.sh --check

      - name: Validate hook output is JSON
        run: bash hooks/session-start 2>&1 | python3 -m json.tool > /dev/null

      - name: Hook warnings test
        run: bash tests/hooks/test-session-start-warnings.sh
