name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Validate Before Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

      - name: Validate plugin.json
        run: |
          python3 <<'PY'
          import json, sys
          m = json.load(open('.claude-plugin/plugin.json'))
          required = {'name', 'description', 'version', 'author', 'license'}
          missing = required - set(m.keys())
          if missing:
              sys.exit(f'plugin.json missing required keys: {missing}')
          print(f'plugin.json: valid ({m["name"]} v{m["version"]})')
          PY

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Tag v$TAG matches package.json version $PKG"

      - name: Verify skill count
        run: |
          count=$(ls -d skills/*/ | wc -l)
          if [ "$count" -lt 15 ]; then
            echo "::error::Expected at least 15 skills, found $count"
            exit 1
          fi

      - name: Verify version sync
        run: bash scripts/bump-version.sh --check

  release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION — see [CHANGELOG.md](CHANGELOG.md) for details."
          fi

          # Write to file for gh release
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md

      - name: Generate and upload checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # GitHub auto-creates source tarballs — download it
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="beads-superpowers-${VERSION}.tar.gz"
          gh release download "$GITHUB_REF_NAME" \
            --pattern "*.tar.gz" \
            --output "$TARBALL" 2>/dev/null || \
          curl -fsSL "https://github.com/${{ github.repository }}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" \
            -o "$TARBALL"

          # Generate checksums
          sha256sum "$TARBALL" > checksums.txt
          echo "Generated checksums.txt:"
          cat checksums.txt

          # Upload as release asset
          gh release upload "$GITHUB_REF_NAME" checksums.txt --clobber
