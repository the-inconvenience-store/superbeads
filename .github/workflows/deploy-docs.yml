name: Deploy Docs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Cairo (for social card generation)
        run: sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install dependencies
        run: pip install "mkdocs-material[imaging]" mkdocs-macros-plugin mkdocs-git-revision-date-localized-plugin mkdocs-panzoom-plugin

      - name: Build and deploy
        run: mkdocs gh-deploy --force
