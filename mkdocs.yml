site_name: beads-superpowers
site_url: https://dollardill.github.io/beads-superpowers/
site_description: >-
  22 composable skills for AI coding agents — TDD, systematic debugging,
  code review, and persistent task memory via Beads. Verified on Claude Code, Codex, and OpenCode;
  best-effort on Cursor, Gemini CLI, GitHub Copilot CLI, Kimi Code,
  Antigravity, Factory Droid, and Pi.
site_author: Dillon Frawley
site_dir: site
repo_url: https://github.com/DollarDill/beads-superpowers
repo_name: DollarDill/beads-superpowers
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.integrate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - macros
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      reconfigure_search: true
      fallback_to_default: true
      languages:
        - { locale: en, name: English, default: true, build: true }
        - locale: zh
          name: 中文
          build: true
          nav_translations:
            Home: 首页
            Getting Started: 快速开始
            Methodology: 方法论
            Skills Reference: 技能参考
            Example Workflow: 工作流示例
            Tips & Tricks: 技巧与窍门
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - panzoom:
      full_screen: true
      key: "alt"
      hint_location: "bottom"
  - social

# Build hooks (see mkdocs_hooks.py). Carries the panzoom×static-i18n
# idempotency shim so the per-locale build passes don't KeyError.
hooks:
  - mkdocs_hooks.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Methodology: methodology.md
  - Skills Reference: skills.md
  - Example Workflow: workflow.md
  - Tips & Tricks: tips.md

extra_css:
  - assets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DollarDill/beads-superpowers
copyright: Copyright &copy; 2026 Dillon Frawley
