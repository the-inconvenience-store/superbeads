site_name: beads-superpowers
site_url: https://dollardill.github.io/beads-superpowers/
site_description: >-
  22 composable skills for AI coding agents — TDD, systematic debugging,
  code review, and persistent task memory via Beads. Works with
  Claude Code, Codex CLI, and OpenCode.
site_author: Dillon Frawley
site_dir: site
repo_url: https://github.com/DollarDill/beads-superpowers
repo_name: DollarDill/beads-superpowers
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.integrate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - social
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - panzoom:
      full_screen: true
      key: "alt"
      hint_location: "bottom"
  - macros

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Methodology: methodology.md
  - Skills Reference: skills.md
  - Example Workflow: workflow.md
  - Tips & Tricks: tips.md

extra_css:
  - assets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DollarDill/beads-superpowers
copyright: Copyright &copy; 2026 Dillon Frawley
